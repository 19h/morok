# Portable e2e gate config for non-Apple platforms (Linux, Windows).
#
# The obfuscator is developed on macOS-arm64, and several max-level passes are
# not yet ported to other targets:
#   - virtualization: its bytecode-VM IR crashes the x86 backend on some inputs.
#   - the anti-analysis + mutual-guard battery (anti_hook/anti_dbg/anti_class_dump/
#     timing_oracles, the SMC-tripwire anti-DBI): Darwin-tuned OS/tamper probes
#     that fault or false-positive on Linux, so the binary SIGSEGVs on every run.
#
# Those passes are exactly what the built-in `max` preset adds over `high`; the
# `high` preset has none of them and runs clean on Linux (differential_high is
# green there). So the portable gate drives the `high` preset, disabling only
# `virtualization` (the one high-level pass that still crashes the x86 backend,
# e.g. on mem_random.c). This is the maximum intensity that is correct on every
# platform today; widen it back toward `max` as each pass above is ported.
#
# macOS still exercises the full `max`/`high` presets and max.toml — see
# tests/e2e/CMakeLists.txt.
[global]
preset = "high"

[passes.virtualization]
enabled = false
probability = 0

[passes.self_checksum_constants]
# Linux arm64's portable runtime differential is not yet activation-cache
# stable: sampling the integrity diff once at function entry can poison
# argument constants in 02_fibonacci.c.  Keep the original per-use self-check
# behavior for this cross-platform gate while Darwin and explicit operator
# configs can still use the default activation cache or `diff_cache = "static"`.
diff_cache = "direct"
