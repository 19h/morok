name: Bump LLVM trunk pin

# Track upstream LLVM trunk on a cadence instead of on every push: resolve the
# latest llvm/llvm-project main commit and, if it moved, open a PR updating
# .github/llvm-trunk.env. Pinning keeps the expensive LLVM build caches warm
# between bumps; this job is what advances the pin so CI keeps building trunk.
on:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC
  workflow_dispatch:
    inputs:
      ref:
        description: "Explicit llvm-project commit SHA (default: latest main)."
        required: false

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: llvm-trunk-pin
  cancel-in-progress: false

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Resolve target LLVM commit
        id: resolve
        shell: bash
        env:
          INPUT_REF: ${{ inputs.ref }}
        run: |
          set -euo pipefail
          if [ -n "$INPUT_REF" ]; then
            new="$INPUT_REF"
          else
            new="$(git ls-remote https://github.com/llvm/llvm-project.git refs/heads/main | cut -f1)"
          fi
          if [[ ! "$new" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::LLVM ref must resolve to a full 40-hex commit SHA"
            exit 1
          fi
          source .github/llvm-trunk.env
          {
            echo "old=${LLVM_REF}"
            echo "new=${new}"
            if [ "${LLVM_REF}" = "${new}" ]; then
              echo "changed=false"
            else
              echo "changed=true"
            fi
          } >> "$GITHUB_OUTPUT"
          echo "Current: ${LLVM_REF}"
          echo "Latest : ${new}"

      - name: Update pin
        if: steps.resolve.outputs.changed == 'true'
        shell: bash
        env:
          NEW_REF: ${{ steps.resolve.outputs.new }}
        run: |
          set -euo pipefail
          sed -i "s/^LLVM_REF=.*/LLVM_REF=${NEW_REF}/" .github/llvm-trunk.env

      - name: Open pull request
        if: steps.resolve.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
        with:
          branch: chore/bump-llvm-trunk
          delete-branch: true
          title: "ci: bump LLVM trunk pin to ${{ steps.resolve.outputs.new }}"
          commit-message: "ci: bump LLVM trunk pin to ${{ steps.resolve.outputs.new }}"
          body: |
            Advances the pinned upstream LLVM trunk commit that Morok builds against.

            - From: `${{ steps.resolve.outputs.old }}`
            - To:   `${{ steps.resolve.outputs.new }}`

            CI builds LLVM trunk at the new commit on first run (cold cache), then
            caches it keyed by SHA. Merge once the matrix is green.
          labels: |
            dependencies
            llvm
